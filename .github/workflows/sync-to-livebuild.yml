name: Sync to schoolos-livebuild

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug secrets
        run: |
          echo "Length: ${#SYNC_TOKEN}"
          echo "Is empty: $([[ -z "$SYNC_TOKEN" ]] && echo YES || echo NO)"
          env | grep -i sync || echo "SYNC_TOKEN not in env at all"
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}

      - name: Push to private repo
        run: |
          git remote add target https://x-access-token:${SYNC_TOKEN}@github.com/claw-h/schoolos-livebuild.git
          git push target main --force
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}