name: Sync to schoolos-livebuild

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to private repo
        env:
          PRIVATE_REPO_URL: ${{ secrets.LIVEBUILD_REPO_URL }}
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add livebuild "$PRIVATE_REPO_URL"
          git push livebuild main --force
