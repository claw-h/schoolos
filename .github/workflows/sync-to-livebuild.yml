name: Sync to schoolos-livebuild

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Debug - Check secret
        run: |
          echo "Secret length: ${#SYNC_TOKEN}"
          echo "URL would be: https://claw-h:***@github.com/claw-h/schoolos-livebuild.git"
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}

      - name: Push to private repo
        run: |
          git push "https://claw-h:${SYNC_TOKEN}@github.com/claw-h/schoolos-livebuild.git" main --force
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
