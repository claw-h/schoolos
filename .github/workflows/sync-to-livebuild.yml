name: Sync to schoolos-livebuild

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to private repo
        run: |
          git remote add livebuild "https://claw-h:${{ secrets.SYNC_TOKEN }}@github.com/claw-h/schoolos-livebuild.git"
          git push livebuild main --force
