name: Sync to schoolos-livebuild

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to private repo
        run: |
          git remote add target https://x-access-token:${SYNC_TOKEN}@github.com/claw-h/schoolos-livebuild.git
          git push target main --force
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}